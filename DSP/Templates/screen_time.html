{% extends "base.html" %}
{% block content %}

<h1>Screen time editor</h1>
<p class="muted">Edit screen time for <strong>{{ entry_date }}</strong>. Change the date using <code>?date=YYYY-MM-DD</code>.</p>

<form method="post">
  <label>Hours</label>
  <input type="number" step="0.25" min="0" max="24" name="hours" placeholder="e.g., 2.5"
         value="{{ hours }}" required>
  <button type="submit">Save screen time</button>
</form>

<div class="muted" style="margin-top:12px;">
  <a href="{{ url_for('dashboard') }}">Back to dashboard</a>
</div>

{% endblock %}
